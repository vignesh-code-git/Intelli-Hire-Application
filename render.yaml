services:
  - type: web
    name: intellihire-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python seed_jobs.py && python seed_cv_dataset.py
    startCommand: gunicorn intellihire_backend.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: intellihire-db
          property: connectionString
      # Set this to your Vercel frontend URL, e.g. https://intelli-hire.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: intellihire-db
    plan: free
